name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  linux-tarball:
    name: Linux tarball
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev libhidapi-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify release tag
        id: version
        run: echo "version=$(packaging/scripts/assert-release-tag.sh '${{ github.ref }}')" >> "$GITHUB_OUTPUT"
      - name: Build
        run: cargo build --workspace --release
      - name: Package
        run: |
          mkdir -p dist
          strip target/release/pip-switch target/release/pip-switch-daemon || true
          packaging/scripts/package-tarball.sh "${{ steps.version.outputs.version }}" x86_64-unknown-linux-gnu dist
      - uses: actions/upload-artifact@v4
        with:
          name: linux-tarball
          path: dist/*.tar.gz

  linux-deb:
    name: Debian package
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev libhidapi-dev dpkg-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-deb
        run: cargo install cargo-deb --locked
      - name: Verify release tag
        id: version
        run: echo "version=$(packaging/scripts/assert-release-tag.sh '${{ github.ref }}')" >> "$GITHUB_OUTPUT"
      - name: Build
        run: cargo build --workspace --release
      - name: Package
        run: |
          mkdir -p dist
          cargo deb -p pip-switch --no-build --output "dist/pip-switch-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.deb"
      - uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: dist/*.deb

  fedora-rpm:
    name: Fedora RPM
    runs-on: ubuntu-24.04
    container: fedora:44

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          dnf install -y \
            gcc \
            git \
            pkgconf-pkg-config \
            hidapi-devel \
            systemd-devel \
            rustup
          rustup-init -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-generate-rpm
        run: cargo install cargo-generate-rpm --locked
      - name: Verify release tag
        id: version
        run: echo "version=$(packaging/scripts/assert-release-tag.sh '${{ github.ref }}')" >> "$GITHUB_OUTPUT"
      - name: Build
        run: cargo build --workspace --release
      - name: Package
        run: |
          mkdir -p dist
          strip target/release/pip-switch target/release/pip-switch-daemon || true
          cargo generate-rpm -p crates/pip-switch -o "dist/pip-switch-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.rpm"
      - uses: actions/upload-artifact@v4
        with:
          name: fedora-rpm
          path: dist/*.rpm

  windows-msi:
    name: Windows MSI
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify release tag
        id: version
        shell: bash
        run: echo "version=$(packaging/scripts/assert-release-tag.sh '${{ github.ref }}')" >> "$GITHUB_OUTPUT"
      - name: Build
        run: cargo build --workspace --release
      - name: Install WiX
        run: dotnet tool install --global wix
      - name: Stage files
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\stage | Out-Null
          Copy-Item target\release\pip-switch.exe dist\stage\
          Copy-Item target\release\pip-switch-daemon.exe dist\stage\
          Copy-Item README.md dist\stage\
      - name: Build MSI
        shell: pwsh
        run: |
          wix build packaging\windows\pip-switch.wxs `
            -d SourceDir="$PWD\dist\stage" `
            -d Version="${{ steps.version.outputs.version }}" `
            -arch x64 `
            -o "dist\pip-switch-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.msi"
      - name: Build ZIP
        shell: pwsh
        run: Compress-Archive -Path dist\stage\* -DestinationPath "dist\pip-switch-${{ steps.version.outputs.version }}-x86_64-pc-windows-msvc.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: |
            dist/*.msi
            dist/*.zip

  macos:
    name: macOS ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            target: x86_64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify release tag
        id: version
        run: echo "version=$(packaging/scripts/assert-release-tag.sh '${{ github.ref }}')" >> "$GITHUB_OUTPUT"
      - name: Build
        run: cargo build --workspace --release
      - name: Package DMG
        run: |
          mkdir -p dist
          packaging/macos/create-dmg.sh "${{ steps.version.outputs.version }}" "${{ matrix.target }}" dist
      - uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: dist/*.dmg

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - linux-tarball
      - linux-deb
      - fedora-rpm
      - windows-msi
      - macos

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
