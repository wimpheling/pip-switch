name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ubuntu-24.04
            os: ubuntu-24.04
          - name: windows
            os: windows-latest
          - name: macos-x86_64
            os: macos-13
          - name: macos-aarch64
            os: macos-14

    steps:
      - uses: actions/checkout@v4
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libudev-dev libhidapi-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --workspace --release

  fedora-44:
    name: fedora-44
    runs-on: ubuntu-24.04
    container: fedora:44

    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          dnf install -y \
            gcc \
            pkgconf-pkg-config \
            hidapi-devel \
            systemd-devel \
            gtk3-devel \
            libayatana-appindicator-gtk3-devel \
            rustup
          rustup-init -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      - run: cargo build --workspace --release
